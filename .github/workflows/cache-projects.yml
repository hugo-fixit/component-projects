name: Cache Projects Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Extract repos from data files
        id: repos
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/bin/yq
          fi
          repos=""
          for f in data/projects*.yml data/projects*.yaml; do
            [ -f "$f" ] || continue
            extracted=$(yq '.. | .repos? // empty | .[]' "$f" 2>/dev/null)
            repos="$repos"$'\n'"$extracted"
          done
          repos=$(echo "$repos" | sort -u | grep -v '^$')
          echo "$repos" > /tmp/repos.txt
          echo "Found repos:"
          cat /tmp/repos.txt

      - name: Fetch repo data from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cache_file="data/caches/projects.json"
          mkdir -p data

          # Load existing cache if present
          if [ -f "$cache_file" ]; then
            existing=$(cat "$cache_file")
          else
            existing="{}"
          fi

          result="{}"
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Fetching: $repo"

            # Get repo info
            repo_json=$(gh api "repos/$repo" 2>/dev/null) || {
              echo "  Failed to fetch repo info, skipping"
              continue
            }

            # Get README content
            readme_content=""
            readme_html_url=""
            readme_json=$(gh api "repos/$repo/readme" 2>/dev/null) || true
            if [ -n "$readme_json" ]; then
              readme_content=$(echo "$readme_json" | jq -r '.content // empty' | base64 -d 2>/dev/null)
              readme_html_url=$(echo "$readme_json" | jq -r '.html_url // empty')
            fi

            if [ -z "$readme_content" ]; then
              echo "  No README found, skipping"
              continue
            fi

            # Write readme content to temp file to avoid shell escaping issues
            echo "$readme_content" > /tmp/readme_content.txt
            echo "$readme_html_url" > /tmp/readme_html_url.txt

            # Merge repo info with readme
            entry=$(echo "$repo_json" | jq -c \
              --rawfile readme_content /tmp/readme_content.txt \
              --rawfile readme_html_url /tmp/readme_html_url.txt \
              '. + {
                readme: {
                  content: $readme_content,
                  html_url: ($readme_html_url | gsub("\n"; ""))
                }
              }')

            # Add to result, keyed by full_name
            full_name=$(echo "$repo_json" | jq -r '.full_name')
            # Write entry to temp file to avoid shell escaping
            echo "$entry" > /tmp/entry.json
            result=$(echo "$result" | jq -c --arg key "$full_name" --slurpfile val /tmp/entry.json '. + {($key): $val[0]}')
            echo "  Cached: $full_name"
          done < /tmp/repos.txt

          # Merge with existing cache (keep entries not in current list)
          echo "$result" > /tmp/fresh.json
          echo "$existing" > /tmp/existing.json
          merged=$(jq -n --slurpfile existing /tmp/existing.json --slurpfile fresh /tmp/fresh.json '$existing[0] * $fresh[0]')
          echo "$merged" | jq '.' > "$cache_file"
          echo "Cache updated: $cache_file"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_user_name: Cell[bot]
          commit_user_email: lrhx@users.noreply.github.com
          commit_author: Cell[bot] <lrhx@users.noreply.github.com>
          commit_message: 'chore(data): update projects cache'
